; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = m5stack-capsule-v1_1

[env:esp32-s3-devkitc-1]
platform = platformio/espressif32@6.13.0
board = esp32-s3-devkitc-1
framework = arduino
lib_deps = 
	adafruit/Adafruit BMP3XX Library
	adafruit/Adafruit BMP280 Library
	adafruit/Adafruit AHTX0
	
debug_tool = esp-builtin
debug_speed = 5000
upload_protocol = esp-builtin
upload_speed = 5000
build_type = debug
monitor_speed = 115200
monitor_dtr = 1
monitor_rts = 1
board_upload.flash_size = 8MB
board_upload.maximum_size = 8388608
build_flags = 
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
	-D CORE_DEBUG_LEVEL=3
	-D CONFIG_LOG_DEFAULT_LEVEL=3 
	-D DEBUG_BLE_NOTIFICATIONS=1
monitor_filters = esp32_exception_decoder

[env:m5stack-capsule-v1_1]
platform = platformio/espressif32@6.13.0
board = m5stack-stamps3
framework = arduino
lib_deps =
	adafruit/Adafruit BMP3XX Library
	adafruit/Adafruit BMP280 Library
	adafruit/Adafruit AHTX0
	m5stack/M5Unified@^0.2.11
upload_protocol = esptool
monitor_speed = 115200
monitor_port = hwgrep://VID:PID=303A:1001
board_upload.flash_size = 8MB
board_upload.maximum_size = 8388608
build_flags =
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
	-D M5STACK_CAPSULE=1
	-D CORE_DEBUG_LEVEL=3
	-D CONFIG_LOG_DEFAULT_LEVEL=3
	-D DEBUG_BLE_NOTIFICATIONS=1
monitor_filters = esp32_exception_decoder

; Bare StampS3 or a custom carrier. This deliberately does not define
; M5STACK_CAPSULE, so Capsule RTC/IMU/power-hold and Capsule SD pins are not
; assumed. External I2C and SPI pins come from SystemConfig.h/build flags.
[env:m5stack-stamps3-generic]
platform = platformio/espressif32@6.13.0
board = m5stack-stamps3
framework = arduino
lib_deps =
	adafruit/Adafruit BMP3XX Library
	adafruit/Adafruit BMP280 Library
	adafruit/Adafruit AHTX0
upload_protocol = esptool
monitor_speed = 115200
board_upload.flash_size = 8MB
board_upload.maximum_size = 8388608
build_flags =
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
	-D CORE_DEBUG_LEVEL=3
	-D CONFIG_LOG_DEFAULT_LEVEL=3
	-D DEBUG_BLE_NOTIFICATIONS=1
monitor_filters = esp32_exception_decoder

;0: ESP_LOG_NONE
;1: ESP_LOG_ERROR (ESP_LOGE)
;2: ESP_LOG_WARN (ESP_LOGW)
;3: ESP_LOG_INFO (ESP_LOGI)
;4: ESP_LOG_DEBUG (ESP_LOGD)
;5: ESP_LOG_VERBOSE (ESP_LOGV)
